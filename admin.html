<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>PAUA Admin Panel</title>
  <link rel="stylesheet" href="https://unpkg.com/modern-normalize/modern-normalize.css" />
  <style>
    body { font-family: system-ui, sans-serif; padding: 2rem; background: #f4f6f9; max-width: 800px; margin: 0 auto; }
    .hidden { display: none !important; }
    .card { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 2rem; }
    input, textarea, button { display: block; width: 100%; margin-bottom: 1rem; padding: 0.5rem; }
    button { background: #0a447e; color: white; border: none; cursor: pointer; font-weight: bold; }
    button:hover { background: #00a1c8; }
    
    /* Navigation Tabs */
    .tabs { display: flex; gap: 1rem; margin-bottom: 1.5rem; }
    .tab-btn { background: #bdc3c7; color: #333; padding: 0.75rem 1.5rem; border-radius: 4px; border: none; width: auto; margin-bottom: 0; }
    .tab-btn.active { background: #0a447e; color: white; }

    .item-row { display: flex; justify-content: space-between; align-items: center; padding: 0.5rem; border-bottom: 1px solid #ddd; }
    .btn-danger { background: #c0392b; width: auto; display: inline-block; padding: 0.25rem 0.5rem; font-size: 0.8rem; margin: 0 0 0 5px; }
    .btn-edit { background: #f39c12; width: auto; display: inline-block; padding: 0.25rem 0.5rem; font-size: 0.8rem; margin: 0; }
    .img-preview { max-height: 100px; margin-bottom: 1rem; display: block; }
    .upload-box { border: 2px dashed #ccc; padding: 1rem; text-align: center; margin-bottom: 1rem; background: #fafafa; }
  </style>
</head>
<body>

  <!-- 1. LOGIN FORM -->
  <div id="login-section" class="card">
    <h2>PAUA Exec Login</h2>
    <form id="login-form">
      <input type="email" id="email" placeholder="UoA / Exec Email" required />
      <input type="password" id="password" placeholder="Password" required />
      <button type="submit">Log In</button>
    </form>
  </div>

  <!-- 2. ADMIN DASHBOARD -->
  <div id="admin-dashboard" class="hidden">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
      <h2>PAUA Admin Dashboard</h2>
      <button id="btn-logout" style="width: auto;">Log Out</button>
    </div>

    <!-- Navigation Tabs -->
    <div class="tabs">
      <button class="tab-btn active" id="tab-events-btn">Manage Events</button>
      <button class="tab-btn" id="tab-merch-btn">Manage Merch</button>
    </div>

    <!-- ==================== EVENTS SECTION ==================== -->
    <div id="section-events">
      <!-- Create / Edit Event -->
      <div class="card">
        <h3 id="event-form-title">Add New Event</h3>
        <form id="event-form">
          <input type="hidden" id="event-id" />
          <input type="text" id="event-title" placeholder="Event Title (e.g. Careers Panel)" required />
          <input type="text" id="event-date" placeholder="Date Details (e.g. Week 5 | Fri 21st Aug • 6pm)" required />
          
          <div class="upload-box">
            <label for="event-image-file"><strong>Upload Event Poster:</strong></label>
            <input type="file" id="event-image-file" accept="image/*" />
            <span id="event-upload-status" style="font-size: 0.85rem; color: #555;"></span>
          </div>

          <input type="text" id="event-image" placeholder="Image URL" required />
          <img id="event-preview" class="img-preview hidden" src="" />

          <input type="text" id="event-rsvp" placeholder="RSVP Form Link (Optional)" />
          <button type="submit" id="event-submit-btn">Publish Event</button>
          <button type="button" id="event-cancel-btn" class="hidden" style="background: #7f8c8d;">Cancel Edit</button>
        </form>
      </div>

      <!-- Manage Events List -->
      <div class="card">
        <h3>Current Events</h3>
        <div id="events-list">Loading events...</div>
      </div>
    </div>

    <!-- ==================== MERCH SECTION ==================== -->
    <div id="section-merch" class="hidden">
      <!-- Create / Edit Merch -->
      <div class="card">
        <h3 id="merch-form-title">Add New Merch Item</h3>
        <form id="merch-form">
          <input type="hidden" id="merch-id" />
          <input type="text" id="merch-title" placeholder="Item Name (e.g. PAUA Hoodie)" required />
          <input type="text" id="merch-price" placeholder="Price (e.g. $60 or $35)" required />
          <textarea id="merch-desc" placeholder="Brief Description (e.g. Comfy, perfect for labs)" rows="2"></textarea>
          
          <div class="upload-box">
            <label for="merch-image-file"><strong>Upload Merch Image:</strong></label>
            <input type="file" id="merch-image-file" accept="image/*" />
            <span id="merch-upload-status" style="font-size: 0.85rem; color: #555;"></span>
          </div>

          <input type="text" id="merch-image" placeholder="Image URL" required />
          <img id="merch-preview" class="img-preview hidden" src="" />

          <button type="submit" id="merch-submit-btn">Add Merch Item</button>
          <button type="button" id="merch-cancel-btn" class="hidden" style="background: #7f8c8d;">Cancel Edit</button>
        </form>
      </div>

      <!-- Manage Merch List -->
      <div class="card">
        <h3>Current Merch Items</h3>
        <div id="merch-list">Loading merch...</div>
      </div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://waqjttxfolrelorwalkb.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_PjH8ZUbqXD4zBYGOnzdRFQ_Y0XcKR8q";
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Auth & UI elements
    const loginSection = document.getElementById('login-section');
    const adminDashboard = document.getElementById('admin-dashboard');

    // Handle Auth Changes
    supabaseClient.auth.onAuthStateChange((event, session) => {
      if (session) {
        loginSection.classList.add('hidden');
        adminDashboard.classList.remove('hidden');
        loadAdminEvents();
        loadAdminMerch();
      } else {
        loginSection.classList.remove('hidden');
        adminDashboard.classList.add('hidden');
      }
    });

    // Login
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
      if (error) alert("Login failed: " + error.message);
    });

    // Logout
    document.getElementById('btn-logout').addEventListener('click', () => supabaseClient.auth.signOut());

    // --- TAB SWITCHING SYSTEM ---
    const tabEventsBtn = document.getElementById('tab-events-btn');
    const tabMerchBtn = document.getElementById('tab-merch-btn');
    const sectionEvents = document.getElementById('section-events');
    const sectionMerch = document.getElementById('section-merch');

    tabEventsBtn.addEventListener('click', () => {
      tabEventsBtn.classList.add('active');
      tabMerchBtn.classList.remove('active');
      sectionEvents.classList.remove('hidden');
      sectionMerch.classList.add('hidden');
    });

    tabMerchBtn.addEventListener('click', () => {
      tabMerchBtn.classList.add('active');
      tabEventsBtn.classList.remove('active');
      sectionMerch.classList.remove('hidden');
      sectionEvents.classList.add('hidden');
    });


    // ==========================================
    //            EVENTS JAVASCRIPT
    // ==========================================
    const eventForm = document.getElementById('event-form');
    const eventSubmitBtn = document.getElementById('event-submit-btn');
    const eventCancelBtn = document.getElementById('event-cancel-btn');
    const eventFormTitle = document.getElementById('event-form-title');

    // Image Upload
    document.getElementById('event-image-file').addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      document.getElementById('event-upload-status').innerText = "Uploading...";
      const fileExt = file.name.split('.').pop();
      const fileName = `${Date.now()}-${Math.random().toString(36).substring(2, 7)}.${fileExt}`;
      const filePath = `uploads/${fileName}`;

      const { data, error } = await supabaseClient.storage.from('event-images').upload(filePath, file);
      if (error) {
        alert("Upload failed: " + error.message);
        document.getElementById('event-upload-status').innerText = "Failed.";
        return;
      }
      const { data: publicUrlData } = supabaseClient.storage.from('event-images').getPublicUrl(filePath);
      
      document.getElementById('event-image').value = publicUrlData.publicUrl;
      const preview = document.getElementById('event-preview');
      preview.src = publicUrlData.publicUrl;
      preview.classList.remove('hidden');
      document.getElementById('event-upload-status').innerText = "Done!";
    });

    // Form Submit (Insert / Update)
    eventForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const id = document.getElementById('event-id').value;
      const title = document.getElementById('event-title').value;
      const date_string = document.getElementById('event-date').value;
      const image_url = document.getElementById('event-image').value;
      const rsvp_link = document.getElementById('event-rsvp').value || null;

      const payload = { title, date_string, image_url, rsvp_link };

      if (id) {
        const { error } = await supabaseClient.from('events').update(payload).eq('id', id);
        if (error) alert(error.message);
        else { alert("Event updated!"); resetEventForm(); loadAdminEvents(); }
      } else {
        const { error } = await supabaseClient.from('events').insert([payload]);
        if (error) alert(error.message);
        else { alert("Event added!"); resetEventForm(); loadAdminEvents(); }
      }
    });

    async function loadAdminEvents() {
      const { data: events } = await supabaseClient.from('events').select('*').order('created_at', { ascending: true });
      const listDiv = document.getElementById('events-list');
      listDiv.innerHTML = '';
      events.forEach(ev => {
        listDiv.innerHTML += `
          <div class="item-row">
            <span><strong>${ev.title}</strong> (${ev.date_string})</span>
            <div>
              <button class="btn-edit" onclick="startEditEvent('${ev.id}', '${encodeURIComponent(ev.title)}', '${encodeURIComponent(ev.date_string)}', '${encodeURIComponent(ev.image_url)}', '${encodeURIComponent(ev.rsvp_link || '')}')">Edit</button>
              <button class="btn-danger" onclick="deleteEvent('${ev.id}')">Delete</button>
            </div>
          </div>
        `;
      });
    }

    window.startEditEvent = (id, title, date, img, rsvp) => {
      document.getElementById('event-id').value = id;
      document.getElementById('event-title').value = decodeURIComponent(title);
      document.getElementById('event-date').value = decodeURIComponent(date);
      document.getElementById('event-image').value = decodeURIComponent(img);
      const preview = document.getElementById('event-preview');
      preview.src = decodeURIComponent(img);
      preview.classList.remove('hidden');
      document.getElementById('event-rsvp').value = decodeURIComponent(rsvp);

      eventFormTitle.innerText = "Edit Event";
      eventSubmitBtn.innerText = "Update Event";
      eventCancelBtn.classList.remove('hidden');
    };

    eventCancelBtn.addEventListener('click', resetEventForm);
    function resetEventForm() {
      eventForm.reset();
      document.getElementById('event-id').value = '';
      document.getElementById('event-preview').classList.add('hidden');
      document.getElementById('event-upload-status').innerText = '';
      eventFormTitle.innerText = "Add New Event";
      eventSubmitBtn.innerText = "Publish Event";
      eventCancelBtn.classList.add('hidden');
    }

    window.deleteEvent = async (id) => {
      if (confirm("Remove this event?")) {
        await supabaseClient.from('events').delete().eq('id', id);
        resetEventForm();
        loadAdminEvents();
      }
    };


    // ==========================================
    //            MERCH JAVASCRIPT
    // ==========================================
    const merchForm = document.getElementById('merch-form');
    const merchSubmitBtn = document.getElementById('merch-submit-btn');
    const merchCancelBtn = document.getElementById('merch-cancel-btn');
    const merchFormTitle = document.getElementById('merch-form-title');

    // Merch Image Upload
    document.getElementById('merch-image-file').addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      document.getElementById('merch-upload-status').innerText = "Uploading...";
      const fileExt = file.name.split('.').pop();
      const fileName = `${Date.now()}-${Math.random().toString(36).substring(2, 7)}.${fileExt}`;
      const filePath = `uploads/${fileName}`;

      const { data, error } = await supabaseClient.storage.from('merch-images').upload(filePath, file);
      if (error) {
        alert("Upload failed: " + error.message);
        document.getElementById('merch-upload-status').innerText = "Failed.";
        return;
      }
      const { data: publicUrlData } = supabaseClient.storage.from('merch-images').getPublicUrl(filePath);
      
      document.getElementById('merch-image').value = publicUrlData.publicUrl;
      const preview = document.getElementById('merch-preview');
      preview.src = publicUrlData.publicUrl;
      preview.classList.remove('hidden');
      document.getElementById('merch-upload-status').innerText = "Done!";
    });

    // Form Submit (Insert / Update)
    merchForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const id = document.getElementById('merch-id').value;
      const title = document.getElementById('merch-title').value;
      const price = document.getElementById('merch-price').value;
      const description = document.getElementById('merch-desc').value || null;
      const image_url = document.getElementById('merch-image').value;

      const payload = { title, price, description, image_url };

      if (id) {
        const { error } = await supabaseClient.from('merch').update(payload).eq('id', id);
        if (error) alert(error.message);
        else { alert("Merch updated!"); resetMerchForm(); loadAdminMerch(); }
      } else {
        const { error } = await supabaseClient.from('merch').insert([payload]);
        if (error) alert(error.message);
        else { alert("Merch item added!"); resetMerchForm(); loadAdminMerch(); }
      }
    });

    async function loadAdminMerch() {
      const { data: merch } = await supabaseClient.from('merch').select('*').order('created_at', { ascending: true });
      const listDiv = document.getElementById('merch-list');
      listDiv.innerHTML = '';
      merch.forEach(m => {
        listDiv.innerHTML += `
          <div class="item-row">
            <span><strong>${m.title}</strong> (${m.price})</span>
            <div>
              <button class="btn-edit" onclick="startEditMerch('${m.id}', '${encodeURIComponent(m.title)}', '${encodeURIComponent(m.price)}', '${encodeURIComponent(m.description || '')}', '${encodeURIComponent(m.image_url)}')">Edit</button>
              <button class="btn-danger" onclick="deleteMerch('${m.id}')">Delete</button>
            </div>
          </div>
        `;
      });
    }

    window.startEditMerch = (id, title, price, desc, img) => {
      document.getElementById('merch-id').value = id;
      document.getElementById('merch-title').value = decodeURIComponent(title);
      document.getElementById('merch-price').value = decodeURIComponent(price);
      document.getElementById('merch-desc').value = decodeURIComponent(desc);
      document.getElementById('merch-image').value = decodeURIComponent(img);
      const preview = document.getElementById('merch-preview');
      preview.src = decodeURIComponent(img);
      preview.classList.remove('hidden');

      merchFormTitle.innerText = "Edit Merch Item";
      merchSubmitBtn.innerText = "Update Item";
      merchCancelBtn.classList.remove('hidden');
    };

    merchCancelBtn.addEventListener('click', resetMerchForm);
    function resetMerchForm() {
      merchForm.reset();
      document.getElementById('merch-id').value = '';
      document.getElementById('merch-preview').classList.add('hidden');
      document.getElementById('merch-upload-status').innerText = '';
      merchFormTitle.innerText = "Add New Merch Item";
      merchSubmitBtn.innerText = "Add Merch Item";
      merchCancelBtn.classList.add('hidden');
    }

    window.deleteMerch = async (id) => {
      if (confirm("Remove this merch item?")) {
        await supabaseClient.from('merch').delete().eq('id', id);
        resetMerchForm();
        loadAdminMerch();
      }
    };
  </script>
</body>
</html>
